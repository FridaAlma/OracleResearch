# =============================================================================
# Oracle - Pytest Configuration
# =============================================================================

[pytest]
# Test execution
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test discovery
testpaths = tests

# Verbosity
addopts = -v --tb=short

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests
    security: marks tests as security tests

# Output
showlocals = True
truncate_traceback = True

# Logging
log_cli = True
log_cli_level = INFO
log_file = logs/test.log
log_file_level = DEBUG
log_file_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# Coverage (if pytest-cov is installed)
[coverage:run]
source = .
omit = 
    tests/*
    tests/conftest.py
    .venv/*
    venv/*
    __pycache__/*
    *.pyc

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):.*
    @(abc\.)?abstractmethod

# Filter warnings
filterwarnings = 
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::RuntimeWarning
    ignore::UserWarning

# Timeout for slow tests
timeout = 60

# Parallel execution (if pytest-xdist is installed)
# addopts = -n auto

# Disable readline on Windows to avoid compatibility issues
addopts = --no-cov -p no:cacheprovider -p no:readline

# Environment variables
env =
    PYTHONPATH = .
    ORACLE_TEST_MODE = true
