<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Archivo:wght@600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #05070a;
    font-family: 'IBM Plex Mono', monospace;
    color: #cdd5de;
    overflow: hidden;
  }

  /* ── Matrix Rain ─────────────────────────────── */
  #rain {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    filter: blur(1.5px) brightness(1.5);
    opacity: 0.55;
    z-index: 0;
    pointer-events: none;
    transition: opacity 1s ease;
  }
  #rain.faded {
    opacity: 0.2;
    filter: blur(3px);
  }

  .vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, rgba(5,7,10,0) 0%, rgba(5,7,10,0.55) 55%, rgba(5,7,10,0.95) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── Layout principale ───────────────────────── */
  #app {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    z-index: 2;
    transition: all 0.6s ease;
  }

  /* ── Idle: tutto centrato ─────────────────────── */
  #app.idle {
    justify-content: center;
    align-items: center;
  }

  /* ── Chatting: wordmark in alto, input in basso ── */
  #app.chatting {
    justify-content: flex-start;
    align-items: stretch;
  }

  /* ── Hero area (wordmark + subtitle) ─────────── */
  .hero {
    text-align: center;
    transition: all 0.6s cubic-bezier(0.22,1,0.36,1);
    flex-shrink: 0;
  }

  #app.idle .hero {
    margin-bottom: 2rem;
  }

  #app.chatting .hero {
    padding: 1.2rem 0 0.4rem;
  }

  .wordmark {
    font-family: 'Archivo', sans-serif;
    font-weight: 700;
    letter-spacing: 0.35em;
    color: #cdd5de;
    text-shadow: 0 0 30px rgba(120,150,190,0.35), 0 0 70px rgba(90,30,35,0.25);
    transition: all 0.6s cubic-bezier(0.22,1,0.36,1);
    padding-left: 0.35em;
  }

  #app.idle .wordmark {
    font-size: clamp(3rem, 9vw, 6.5rem);
  }

  #app.chatting .wordmark {
    font-size: clamp(1.2rem, 3vw, 2rem);
    cursor: pointer;
  }

  #app.chatting .wordmark:hover {
    text-shadow: 0 0 40px rgba(120,150,190,0.5);
  }

  .eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    color: #6b7280;
    text-transform: uppercase;
    transition: all 0.6s ease;
  }

  #app.idle .eyebrow {
    margin-top: 0.3rem;
    opacity: 1;
  }

  #app.chatting .eyebrow {
    margin-top: 0.1rem;
    opacity: 0.4;
    font-size: 0.55rem;
  }

  .eyebrow span { color: #8a3a3a; }

  /* ── Penelope badge (top-left) ────────────────── */
  .penelope-badge {
    position: fixed;
    top: 1rem;
    left: 1.5rem;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: #3fb950;
    padding: 4px 10px;
    border-radius: 3px;
    background: rgba(40,140,60,0.08);
    border: 1px solid rgba(40,140,60,0.2);
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
    font-family: 'Archivo', sans-serif;
    text-decoration: none;
  }

  .penelope-badge:hover {
    background: rgba(40,140,60,0.15);
    border-color: rgba(40,140,60,0.4);
    color: #5fd870;
  }

  .penelope-badge .penelope-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #3fb950;
    box-shadow: 0 0 6px rgba(40,140,60,0.6);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .penelope-badge .penelope-icon {
    font-size: 0.75rem;
    line-height: 1;
  }

  /* ── Model badge (top-right) ─────────────────── */
  .model-badge {
    position: fixed;
    top: 1rem;
    right: 1.5rem;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: #6a9fdb;
    padding: 4px 10px;
    border-radius: 3px;
    background: rgba(60,120,200,0.08);
    border: 1px solid rgba(60,120,200,0.2);
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }

  .model-badge:hover {
    background: rgba(60,120,200,0.15);
    border-color: rgba(60,120,200,0.4);
  }

  .model-badge .model-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #3a7ad4;
    box-shadow: 0 0 6px rgba(60,120,200,0.6);
  }

  /* ── Messages area ───────────────────────────── */
  .messages-wrap {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0;
    transition: all 0.6s ease;
    scroll-behavior: smooth;
  }

  #app.idle .messages-wrap {
    flex: 0;
    height: 0;
    opacity: 0;
    overflow: hidden;
  }

  #app.chatting .messages-wrap {
    flex: 1;
    height: auto;
    opacity: 1;
    padding: 0.8rem 0;
  }

  .messages-wrap::-webkit-scrollbar { width: 4px; }
  .messages-wrap::-webkit-scrollbar-track { background: transparent; }
  .messages-wrap::-webkit-scrollbar-thumb { background: rgba(90,110,135,0.3); border-radius: 2px; }

  .messages {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── Messaggi ─────────────────────────────────── */
  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 85%;
    animation: msgIn 0.35s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
  }
  .msg.assistant {
    align-self: flex-start;
  }

  .msg .bubble {
    padding: 10px 14px;
    border-radius: 3px;
    font-size: 0.85rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .msg.user .bubble {
    background: rgba(60,120,200,0.15);
    border: 1px solid rgba(60,120,200,0.25);
    color: #b8cfe5;
  }

  .msg.assistant .bubble {
    background: rgba(18,24,34,0.7);
    border: 1px solid rgba(90,110,135,0.2);
    color: #cdd5de;
  }

  .msg .meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.6rem;
    color: #4a5a6a;
    padding: 0 4px;
  }

  .msg.user .meta {
    justify-content: flex-end;
  }

  .layer-badge {
    display: inline-block;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    padding: 2px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    margin-right: 4px;
    font-weight: 500;
  }
  .layer-badge.oracle    { background: rgba(60,120,200,0.3); color: #6a9fdb; border: 1px solid rgba(60,120,200,0.4); }

  /* ── Thinking block ──────────────────────────── */
  .thinking-block {
    margin: 4px 0;
    padding: 6px 12px;
    background: rgba(120,90,160,0.06);
    border-left: 2px solid rgba(120,90,160,0.3);
    border-radius: 2px;
    font-size: 0.72rem;
    color: #7a8a9a;
    line-height: 1.5;
  }

  .thinking-block .think-toggle {
    cursor: pointer;
    color: #8a7aaa;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .thinking-block .think-toggle:hover {
    color: #a88acc;
  }

  .thinking-block .think-content {
    display: none;
    margin-top: 4px;
    font-style: italic;
    opacity: 0.7;
    font-size: 0.68rem;
  }

  .thinking-block .think-content.open {
    display: block;
  }

  /* ── Code blocks in messages ──────────────────── */
  .msg .bubble code {
    background: rgba(10,14,20,0.7);
    padding: 1px 4px;
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
  }

  .msg .bubble pre {
    background: rgba(10,14,20,0.7);
    border: 1px solid rgba(90,110,135,0.15);
    border-radius: 3px;
    padding: 10px 12px;
    margin: 6px 0;
    overflow-x: auto;
  }

  .msg .bubble pre code {
    background: none;
    padding: 0;
  }

  /* ── Tool activity inside messages ────────────── */
  .tool-activity {
    margin: 4px 0;
    padding: 4px 8px;
    background: rgba(40,40,20,0.15);
    border-left: 2px solid rgba(180,160,40,0.3);
    border-radius: 2px;
    font-size: 0.65rem;
    color: #8a8a5a;
  }

  .tool-activity .tool-name {
    font-weight: 500;
    color: #bab07a;
  }

  /* ── Typing indicator ────────────────────────── */
  .typing-indicator {
    display: none;
    padding: 4px 4px 8px;
    font-size: 0.75rem;
    color: #5a6a7a;
    gap: 6px;
    align-items: center;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
    padding-left: 28px;
  }

  .typing-indicator.active {
    display: flex;
  }

  .typing-indicator .dots span {
    display: inline-block;
    width: 5px; height: 5px;
    background: #5a6a7a;
    border-radius: 50%;
    margin: 0 2px;
    animation: dotPulse 1.4s infinite ease-in-out both;
  }
  .typing-indicator .dots span:nth-child(1) { animation-delay: 0s; }
  .typing-indicator .dots span:nth-child(2) { animation-delay: 0.16s; }
  .typing-indicator .dots span:nth-child(3) { animation-delay: 0.32s; }

  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── Input area ──────────────────────────────── */
  .input-area {
    flex-shrink: 0;
    padding: 0.8rem 24px 1.2rem;
    transition: all 0.6s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  #app.idle .input-area {
    width: min(640px, 86vw);
    margin: 0 auto;
  }

  #app.chatting .input-area {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    border-top: 1px solid rgba(90,110,135,0.08);
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    width: 100%;
    background: rgba(12,16,22,0.72);
    border: 1px solid rgba(90,110,135,0.3);
    border-radius: 3px;
    padding: 0.7rem 1rem;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: border-color 0.3s ease;
  }

  .input-row:focus-within {
    border-color: rgba(120,150,185,0.6);
  }

  .input-row .glyph {
    color: #52708a;
    font-size: 1rem;
    flex-shrink: 0;
    opacity: 0.8;
  }

  .input-row textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #d8dee5;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.02em;
    resize: none;
    overflow: hidden;
    line-height: 1.5;
    align-self: center;
  }

  .input-row textarea::placeholder { color: #4a5158; }

  .input-row .send-btn {
    background: rgba(60,120,200,0.15);
    border: 1px solid rgba(60,120,200,0.25);
    border-radius: 3px;
    color: #6a9fdb;
    padding: 0.5rem 1rem;
    font-family: 'Archivo', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .input-row .send-btn:hover {
    background: rgba(60,120,200,0.3);
    border-color: rgba(60,120,200,0.45);
  }

  .input-row .send-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .status-row {
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    color: #454c53;
    text-transform: uppercase;
    padding: 0 0.3rem;
  }

  .status-row .dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #3a5a3a;
    margin-right: 0.5rem;
    box-shadow: 0 0 6px rgba(80,160,80,0.6);
  }
  .status-row .dot.off { background: #5a3a3a; box-shadow: 0 0 6px rgba(160,80,80,0.6); }

  /* ── Streaming cursor ─────────────────────────── */
  .streaming-cursor::after {
    content: '▊';
    animation: blink 1s step-end infinite;
    color: #6a9fdb;
    margin-left: 2px;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* ── Responsive ──────────────────────────────── */
  @media (max-width: 600px) {
    .msg { max-width: 95%; }
    .messages { padding: 0 12px; }
    .input-area { padding: 0.6rem 12px 1rem; }
    .input-row { padding: 0.6rem 0.8rem; }
    .input-row textarea { font-size: 0.85rem; }
  }
</style>
</head>
<body>

<canvas id="rain"></canvas>
<div class="vignette"></div>

<!-- ── App ──────────────────────────────────── -->
<div id="app" class="idle">

  <!-- Penelope badge (top-left) -->
  <a class="penelope-badge" id="penelopeBadge" title="Apri Penelope — Grafo della Conoscenza" href="http://localhost:5000" target="_blank" rel="noopener">
    <span class="penelope-icon">⬡</span><span class="penelope-dot"></span><span>Penelope</span>
  </a>

  <!-- Model badge (top-right) -->
  <div class="model-badge" id="modelBadge" title="Cambia modello">
    <span class="model-dot"></span><span id="modelLabel">Flash</span>
  </div>

  <!-- Hero -->
  <div class="hero" id="hero" onclick="if(isChatting) resetChat()">
    <div class="wordmark" id="wordmark">ORACLE</div>
    <div class="eyebrow">conoscenza · memoria · identità · <span>oracle</span></div>
  </div>

  <!-- Messages -->
  <div class="messages-wrap" id="messagesWrap">
    <div class="messages" id="messages">
      <!-- messages rendered dynamically -->
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <span class="layer-badge oracle">Oracle</span>
      <span>sta elaborando</span>
      <span class="dots"><span></span><span></span><span></span></span>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area" id="inputArea">
    <div class="input-row" id="inputRow">
      <span class="glyph">❯</span>
      <textarea id="input" rows="1" placeholder="Chiedi qualcosa a Oracle…" autocomplete="off"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage(input.value)">Invia</button>
    </div>
    <div class="status-row">
      <span><span class="dot" id="statusDot"></span><span id="statusText">caricamento…</span></span>
      <span class="right">v0.3 · <span id="layerStatus">oracle</span></span>
    </div>
  </div>

</div>

<script>
// ── Matrix Rain ────────────────────────────────────────────
const canvas = document.getElementById('rain');
const ctx = canvas.getContext('2d');

let W, H, columns, drops, chars;

function resizeRain() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  columns = Math.floor(W / 14);
  chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  drops = Array(columns).fill(1);
}
resizeRain();
window.addEventListener('resize', resizeRain);

function drawRain() {
  ctx.fillStyle = 'rgba(5,7,10,0.05)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#0a3';
  ctx.font = '14px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = Math.random() > 0.97 ? '#5f5' : '#0a3';
    ctx.fillText(text, i * 14, drops[i] * 14);
    if (drops[i] * 14 > H && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawRain, 50);

// ── Config ─────────────────────────────────────────────────
const API_URL = window.location.origin || 'http://localhost:8000';
let isChatting = false;
let hasInteracted = false;
let currentSessionId = generateId();
let modelTier = 'auto';  // auto | flash | pro
let isStreaming = false;
let abortController = null;

function generateId() {
  return 'web_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

// ── Status Check ──────────────────────────────────────────
async function checkStatus() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  try {
    const resp = await fetch(`${API_URL}/api/health`);
    const data = await resp.json();
    if (data.status === 'healthy' || data.status === 'ok') {
      dot.className = 'dot';
      text.textContent = 'oracle attivo';
    } else {
      dot.className = 'dot off';
      text.textContent = 'errore connessione';
    }
  } catch(e) {
    dot.className = 'dot off';
    text.textContent = 'oracle non disponibile';
  }
  // Penelope health check
  const pDot = document.querySelector('.penelope-badge .penelope-dot');
  try {
    const pResp = await fetch('http://localhost:5000/api/stats');
    if (pResp.ok) {
      pDot.style.background = '#3fb950';
      pDot.style.boxShadow = '0 0 6px rgba(40,140,60,0.6)';
    } else {
      pDot.style.background = '#f85149';
      pDot.style.boxShadow = '0 0 6px rgba(248,81,73,0.6)';
    }
  } catch(e) {
    pDot.style.background = '#f85149';
    pDot.style.boxShadow = '0 0 6px rgba(248,81,73,0.6)';
  }
}
checkStatus();
setInterval(checkStatus, 30000);

// ── Model badge ───────────────────────────────────────────
const modelBadge = document.getElementById('modelBadge');
const modelLabel = document.getElementById('modelLabel');
const modelTiers = ['auto', 'flash', 'pro'];
let modelTierIdx = modelTiers.indexOf(modelTier);

modelBadge.addEventListener('click', () => {
  modelTierIdx = (modelTierIdx + 1) % modelTiers.length;
  modelTier = modelTiers[modelTierIdx];
  modelLabel.textContent = modelTier.charAt(0).toUpperCase() + modelTier.slice(1);
  const dot = modelBadge.querySelector('.model-dot');
  if (modelTier === 'pro') {
    dot.style.background = '#9b6aff'; dot.style.boxShadow = '0 0 6px rgba(155,106,255,0.6)';
    modelBadge.style.color = '#b89aff'; modelBadge.style.borderColor = 'rgba(155,106,255,0.3)';
  } else if (modelTier === 'auto') {
    dot.style.background = '#3a7ad4'; dot.style.boxShadow = '0 0 6px rgba(60,120,200,0.6)';
    modelBadge.style.color = '#6a9fdb'; modelBadge.style.borderColor = 'rgba(60,120,200,0.2)';
  } else {
    dot.style.background = '#3a7ad4'; dot.style.boxShadow = '0 0 6px rgba(60,120,200,0.3)';
    modelBadge.style.color = '#5a8ab0'; modelBadge.style.borderColor = 'rgba(60,120,200,0.15)';
  }
});

// ── Transition idle ↔ chatting ────────────────────────────
function enterChat() {
  if (isChatting) return;
  isChatting = true;
  const app = document.getElementById('app');
  app.classList.remove('idle');
  app.classList.add('chatting');
  document.getElementById('rain').classList.add('faded');
  setTimeout(() => {
    document.getElementById('input').focus();
    scrollToBottom();
  }, 400);
}

function resetChat() {
  if (!isChatting) return;
  if (hasInteracted && !confirm('Tornare alla schermata iniziale? La conversazione verrà persa.')) return;
  isChatting = false;
  hasInteracted = false;
  currentSessionId = generateId();
  const app = document.getElementById('app');
  app.classList.remove('chatting');
  app.classList.add('idle');
  document.getElementById('rain').classList.remove('faded');
  document.getElementById('messages').innerHTML = '';
  const inputReset = document.getElementById('input');
  inputReset.value = '';
  inputReset.placeholder = 'Chiedi qualcosa a Oracle…';
  autoResizeTextarea(inputReset);
}

// ── Send Message ──────────────────────────────────────────
async function sendMessage(text) {
  text = (text || '').trim();
  if (!text || isStreaming) return;

  if (!isChatting) {
    enterChat();
    await new Promise(r => setTimeout(r, 500));
  }

  hasInteracted = true;
  const inputEl = document.getElementById('input');
  inputEl.value = '';
  inputEl.placeholder = 'Scrivi una domanda…';
  autoResizeTextarea(inputEl);

  addMessage('user', text);
  scrollToBottom();

  document.getElementById('typingIndicator').classList.add('active');
  document.getElementById('sendBtn').disabled = true;
  isStreaming = true;

  // Crea placeholder per il messaggio streaming
  const streamMsg = createStreamingMessage();
  abortController = new AbortController();

  try {
    // Usa streaming endpoint
    const streamUrl = `${API_URL}/api/chat/stream?message=${encodeURIComponent(text)}&session_id=${encodeURIComponent(currentSessionId)}&model_tier=${encodeURIComponent(modelTier)}`;

    const response = await fetch(streamUrl, {
      signal: abortController.signal,
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let streamContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const event = JSON.parse(data);
            handleStreamEvent(event, streamMsg, streamContent);
            if (event.type === 'content') {
              streamContent += event.data || '';
            }
          } catch(e) {
            // non-JSON data line, skip
          }
        }
      }
    }

    finalizeStreamingMessage(streamMsg, streamContent);

  } catch(e) {
    if (e.name === 'AbortError') {
      // user stopped
      finalizeStreamingMessage(streamMsg, streamMsg._content || '');
    } else {
      // fallback: non-streaming
      removeElement(streamMsg);
      try {
        const resp = await fetch(`${API_URL}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            session_id: currentSessionId,
            model_tier: modelTier,
          }),
        });
        const data = await resp.json();
        addAssistantMessage(data.content || data.error || 'Errore sconosciuto');
      } catch(e2) {
        addMessage('assistant', '⚠️ Non riesco a contattare Oracle. Assicurati che il server sia in esecuzione.');
      }
    }
  } finally {
    document.getElementById('typingIndicator').classList.remove('active');
    document.getElementById('sendBtn').disabled = false;
    isStreaming = false;
    abortController = null;
    scrollToBottom();
  }
}

function createStreamingMessage() {
  const msgArea = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant streaming';
  div.innerHTML = `<div class="meta"><span class="layer-badge oracle">Oracle</span><span>ora</span></div><div class="bubble streaming-cursor"></div>`;
  div._content = '';
  msgArea.appendChild(div);
  return div;
}

function handleStreamEvent(event, streamMsg, currentContent) {
  switch (event.type) {
    case 'model':
      // Model info received — could update badge
      if (event.data && event.data.model_name) {
        document.getElementById('modelLabel').textContent = event.data.model_name.split(' ').pop();
      }
      break;

    case 'content':
      streamMsg._content = (streamMsg._content || '') + (event.data || '');
      streamMsg.querySelector('.bubble').innerHTML =
        renderMarkdown(streamMsg._content) + '<span class="streaming-cursor"></span>';
      scrollToBottom();
      break;

    case 'tool_start':
      if (event.data && event.data.name) {
        appendToolActivity(streamMsg, event.data.name, 'running');
      }
      break;

    case 'tool_end':
      if (event.data && event.data.name) {
        appendToolActivity(streamMsg, event.data.name, 'done');
      }
      break;

    case 'log':
      // Optional: could show logs
      break;

    case 'error':
      const bubble = streamMsg.querySelector('.bubble');
      bubble.innerHTML = renderMarkdown(streamMsg._content || '') +
        '<div style="color:#c06060;margin-top:4px;">⚠️ ' + escapeHtml(event.data || 'Errore') + '</div>';
      break;

    case 'done':
      if (event.session_id) currentSessionId = event.session_id;
      break;
  }
}

function finalizeStreamingMessage(streamMsg, content) {
  if (!streamMsg) return;
  streamMsg.classList.remove('streaming');
  const bubble = streamMsg.querySelector('.bubble');
  if (bubble) {
    bubble.innerHTML = renderMarkdown(content || streamMsg._content || '');
    bubble.classList.remove('streaming-cursor');
  }
}

function appendToolActivity(msgDiv, toolName, status) {
  const bubble = msgDiv.querySelector('.bubble');
  if (!bubble) return;

  // Cerca tool activity esistente o creane una
  let toolDiv = bubble.querySelector('.tool-activity[data-tool="' + toolName + '"]');
  if (!toolDiv) {
    toolDiv = document.createElement('div');
    toolDiv.className = 'tool-activity';
    toolDiv.setAttribute('data-tool', toolName);
    toolDiv.innerHTML = '<span class="tool-name">🔧 ' + escapeHtml(toolName) + '</span>';
    bubble.appendChild(toolDiv);
  }

  if (status === 'done') {
    toolDiv.style.borderLeftColor = 'rgba(80,160,80,0.4)';
    toolDiv.querySelector('.tool-name').style.color = '#7aba7a';
  }
}

// ── Non-streaming assistant message ──────────────────────
function addAssistantMessage(content) {
  const msgArea = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML =
    `<div class="meta"><span class="layer-badge oracle">Oracle</span><span>ora</span></div>` +
    `<div class="bubble">${renderMarkdown(content || '')}</div>`;
  msgArea.appendChild(div);
  scrollToBottom();
}

// ── Add user message ────────────────────────────────────
function addMessage(role, content) {
  const msgArea = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const label = role === 'user' ? 'Tu' : 'Oracle';
  div.innerHTML = `<div class="meta">${role === 'user' ? '' : '<span class="layer-badge oracle">Oracle</span>'}<span>ora</span></div><div class="bubble">${escapeHtml(content)}</div>`;
  msgArea.appendChild(div);
  scrollToBottom();
}

// ── Simple Markdown Renderer ─────────────────────────────
function renderMarkdown(text) {
  if (!text) return '<span class="streaming-cursor"></span>';

  let html = text;

  // Extract code blocks first
  const codeBlocks = [];
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code>${escapeHtml(code.trim())}</code></pre>`);
    return `\x00CODE${idx}\x00`;
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, (_, code) => `<code>${escapeHtml(code)}</code>`);

  // Escape HTML
  html = escapeHtml(html);
  // Restore code blocks (which are already HTML-safe)
  html = html.replace(/\x00CODE(\d+)\x00/g, (_, idx) => codeBlocks[parseInt(idx)]);

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3 style="font-size:1rem;margin:8px 0 4px;">$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2 style="font-size:1.1rem;margin:10px 0 4px;">$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h2 style="font-size:1.2rem;margin:12px 0 6px;">$1</h2>');
  // Lists
  html = html.replace(/^[\s]*[-*] (.+)$/gm, '<li style="margin-left:1rem;">$1</li>');
  // Line breaks to <br>
  html = html.replace(/\n/g, '<br>');

  return html;
}

// ── Utility ──────────────────────────────────────────────
function escapeHtml(text) {
  if (!text) return '';
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function removeElement(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

function scrollToBottom() {
  setTimeout(() => {
    const wrap = document.getElementById('messagesWrap');
    if (wrap) wrap.scrollTop = wrap.scrollHeight;
  }, 50);
}

// ── Input auto-resize ───────────────────────────────────
function autoResizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

document.getElementById('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(e.target.value);
  }
});
document.getElementById('input').addEventListener('input', (e) => {
  autoResizeTextarea(e.target);
});

// ── Keyboard ────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== document.getElementById('input')) {
    e.preventDefault();
    document.getElementById('input').focus();
  }
  if (e.key === 'Escape' && isChatting) {
    document.getElementById('input').blur();
  }
});
</script>
